<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BridgeGap — Household Ledger</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#1B3B2F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BridgeGap" />
<style>
  html, body { margin: 0; padding: 0; background: #F6F2E7; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-error" style="display:none; margin:16px; padding:14px; font-family:monospace; font-size:12px; color:#C0533E; background:#FBEAE6; border:1px solid #C0533E; border-radius:8px; white-space:pre-wrap; word-break:break-word;"></div>

<script>
  function showBootError(msg) {
    var el = document.getElementById('boot-error');
    el.style.display = 'block';
    el.textContent += msg + "\n\n";
  }
  window.addEventListener('error', function (e) {
    if (e.target && e.target !== window && (e.target.src || e.target.href)) {
      showBootError('Failed to load resource: ' + (e.target.src || e.target.href));
    } else {
      showBootError('Script error: ' + e.message + ' (' + (e.filename || '?') + ':' + (e.lineno || '?') + ')');
    }
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    showBootError('Unhandled error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>

<!-- React (production builds) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel standalone lets the browser run JSX directly, no build step needed -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- SheetJS for the Excel export feature -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<!-- Firebase (ES module) -->
<script type="module" src="firebase-init.js"></script>

<!-- The app itself, written in JSX, compiled live by Babel -->
<script type="text/babel" data-presets="react" src="app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
  // If nothing has rendered into #root after 6 seconds, surface a hint.
  setTimeout(function () {
    var root = document.getElementById('root');
    if (root && root.children.length === 0) {
      showBootError('Nothing rendered after 6 seconds. If no other error appears above, the most likely cause is a blocked or failed CDN script (React, Babel, Firebase, or SheetJS) on this network.');
    }
  }, 6000);
</script>
</body>
</html>
