<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BridgeGap — Household Ledger</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#1B3B2F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BridgeGap" />
<style>
  html, body { margin: 0; padding: 0; background: #F6F2E7; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React (production builds) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel standalone lets the browser run JSX directly, no build step needed -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- SheetJS for the Excel export feature -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<!-- Firebase (ES module) -->
<script type="module" src="firebase-init.js"></script>

<!-- The app itself, written in JSX, compiled live by Babel -->
<script type="text/babel" data-presets="react" src="app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
